spring.application.name=backend

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/matchengine}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-key-that-is-at-least-32-characters-long-for-hs256}
app.jwt.expiration-ms=86400000

# Resend
app.resend.api-key=${RESEND_API_KEY:re_placeholder}
app.resend.from-email=noreply@youragency.com

# Server
server.port=8080
